apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: dex
spec:
  parentRefs:
    - name: wac-hospital-gateway
      sectionName: fqdn
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /dex
        - path:
          type: Exact
          # authn callback je spracovaný interne envoy proxy
          # musíme ho ale definovať aby ho envoy neodmietol 
          # a aby sme ho mohli nakonfigurovať bypass security policy 
          value: /authn/callback 
      backendRefs:
        - group: ""
          kind: Service
          name: dex
          port: 5556